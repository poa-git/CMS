# General application settings
spring.application.name=${SPRING_APPLICATION_NAME:Complaint Management System}
server.forward-headers-strategy=FRAMEWORK
# Railway port
server.port=${PORT:8080}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# Allow up to 5000 results per page
spring.data.web.pageable.max-page-size=5000

# Logging levels
logging.level.com.system.complaints.service=${LOGGING_LEVEL_COMPLAINTS_SERVICE:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY:INFO}

# File upload path
jobcard.upload.path=${JOBCARD_UPLOAD_PATH:/tmp/job_cards}
complaintimages.upload.path=${COMPLAINTIMAGES_UPLOAD_PATH:/tmp/complaint_images}

# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Dotenv support
dotenv.enabled=true
dotenv.overload=true

# Session timeout
server.servlet.session.timeout=604800